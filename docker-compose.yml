services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    command: >
      postgres
      -c autovacuum=on
      -c track_counts=on
      -c autovacuum_max_workers=3
      -c autovacuum_naptime=1min
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # BE-DOCKER-01: Postgres takes time to init on first run.
    # pg_isready polls until the TCP port accepts connections AND the DB is ready
    # to accept queries. Server container will not start until this passes.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}
      # SV-07 (Iter 2 K batch): no default — compose will fail loudly if JWT_SECRET is unset.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_BASE_URL=${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=5000
      - WATCHPACK_POLLING=true
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@admin.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-12345543211234554321}
      - SYNC_DB=${SYNC_DB:-true}
    # BE-DOCKER-01: Wait for Postgres to be fully ready before starting the server.
    # Without this, the server tries to connect before Postgres accepts connections,
    # hits a ECONNREFUSED, and calls process.exit(1).
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # BE-DOCKER-01: HTTP health check on the /health endpoint.
    # Because app.listen() is now called AFTER DB init (BE-DOCKER-02 fix in index.ts),
    # this health check only passes once the server is fully initialised:
    # DB connected + schema synced + seed done + Express listening.
    # start_period gives sequelize.sync({ alter: true }) time to run on first boot
    # before Docker starts counting failures.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    # Use polling for file changes (better compatibility across OS)
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - APP_ENV=${APP_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - SERVER_INTERNAL_URL=http://server:5000
      - WATCHPACK_POLLING=true
    # BE-DOCKER-01: Only start the client once the server is genuinely healthy
    # (DB connected, schema synced, Express listening).  This prevents the browser
    # from loading before the API is ready and getting ERR_CONNECTION_REFUSED.
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:

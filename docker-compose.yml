services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    command: >
      postgres
      -c autovacuum=on
      -c track_counts=on
      -c autovacuum_max_workers=3
      -c autovacuum_naptime=1min
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}
      # SV-07 (Iter 2 K batch): no default — compose will fail loudly if JWT_SECRET is unset.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_BASE_URL=${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=5000
      - WATCHPACK_POLLING=true
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@admin.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-12345543211234554321}
      - SYNC_DB=${SYNC_DB:-true}
    depends_on:
      - db
      - redis
    # Use polling for file changes (better compatibility across OS)
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - APP_ENV=${APP_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - SERVER_INTERNAL_URL=http://server:5000
      - WATCHPACK_POLLING=true
    depends_on:
      - server

volumes:
  pgdata:

services:
  # ── Express API ──────────────────────────────────────────────────────────────
  - type: web
    name: biomimic-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # Paste your Neon connection string here (sslmode=require)
      - key: DATABASE_URL
        sync: false

      # Paste your Upstash Redis URL here (rediss://)
      - key: REDIS_URL
        sync: false

      # Render will generate a random secret — or supply your own
      - key: JWT_SECRET
        generateValue: true

      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false

      # PayPal
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_BASE_URL
        value: https://api-m.sandbox.paypal.com

      # Public URL of the Next.js client (fill in after first client deploy)
      - key: CLIENT_URL
        sync: false

      # Email (Gmail + App Password)
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

      # Set to true for the very first deploy to create DB schema, then set back to false
      - key: SYNC_DB
        value: "false"

  # ── Next.js Client ───────────────────────────────────────────────────────────
  - type: web
    name: biomimic-client
    runtime: node
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      # Public API URL — must match the server service URL above + /api
      # e.g. https://biomimic-server.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false

      # Internal URL used by Next.js to proxy /uploads/* to the server
      # Use the server's public Render URL (same as NEXT_PUBLIC_API_URL minus /api)
      - key: SERVER_INTERNAL_URL
        sync: false
